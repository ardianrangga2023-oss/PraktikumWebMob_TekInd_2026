
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Audit 5S</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h3>Checklist Audit 5S</h3>

    <!-- FORM -->
    <div class="card mb-4">
        <div class="card-body">
            <form id="formAudit">

                <div class="mb-3">
                    <label>Nama Auditor</label>
                    <input type="text" id="auditor" class="form-control" required>
                </div>

                <!-- 5S Checklist -->
                <div class="form-check">
                    <input type="checkbox" id="seiri" class="form-check-input">
                    <label class="form-check-label">Seiri</label>
                </div>

                <div class="form-check">
                    <input type="checkbox" id="seiton" class="form-check-input">
                    <label class="form-check-label">Seiton</label>
                </div>

                <div class="form-check">
                    <input type="checkbox" id="seiso" class="form-check-input">
                    <label class="form-check-label">Seiso</label>
                </div>

                <div class="form-check">
                    <input type="checkbox" id="seiketsu" class="form-check-input">
                    <label class="form-check-label">Seiketsu</label>
                </div>

                <div class="form-check mb-3">
                    <input type="checkbox" id="shitsuke" class="form-check-input">
                    <label class="form-check-label">Shitsuke</label>
                </div>

                <button type="submit" class="btn btn-primary w-100">Simpan Audit</button>

            </form>
        </div>
    </div>

    <!-- TABEL -->
    <h4>Riwayat Audit</h4>
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Tanggal</th>
                <th>Auditor</th>
                <th>Skor (%)</th>
            </tr>
        </thead>
        <tbody id="tabelAudit"></tbody>
    </table>

    <script src="proyekmini.js"></script>
</body>

</html>
