<!-- Simulasi Panel Kontrol Mesin (Meeting 6) -->
<div class="card mt-4">
    <div class="card-header bg-dark text-white">Panel Kontrol Mesin-01</div>
    <div class="card-body text-center">
        <!-- Indikator Status -->
        <div id="statusIndicator" class="alert alert-secondary" role="alert">
            Status: <strong>UNKNOWN</strong>
        </div>
        <h2 id="suhuMesin">25 °C</h2>
        <p>Suhu Operasional Saat Ini</p>
        <div class="d-grid gap-2 d-md-block">
            <button id="btnStart" class="btn btn-success btn-lg">START</button>
            <button id="btnStop" class="btn btn-danger btn-lg">STOP</button>
            <button id="btnReset" class="btn btn-warning btn-lg">RESET</button>
        </div>
    </div>
</div>
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body class="container mt-5">
    <div class="row">
        <!-- Kolom kiri: form input-->
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">Input Data</div>
                <div class="card-body">
                    <form id="fomProduksi">
                        <div class="mb-3">
                            <label>Tanggal</label>
                            <input type="date" id="tanggal" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Nama Operator</label>
                            <input type="text" id="operator" class="form-control" placeholder="Nama Lengkap" required>
                        </div>

                        <div class="mb-3">
                            <label>Shift</label>
                            <select id="shift" class="form-select" required>
                                <option value="">Pilih Shift</option>
                                <option value="pagi">pagi</option>
                                <option value="siang">siang</option>
                                <option value="malam">malam</option>
                            </select>
                            <div class="mb-3">
                                <label>Jumlah Produksi (unit)</label>
                                <input type="number" id="jumlah" class="form-control" min="1" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Simpan Log</button>
                            <button type="button" id="btnHapusSemua" class="btn btn-danger w-100 mt-2">Hapus Semua
                                Data</button>

                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Kolom kanan: tabel data -->
        <div class="col-md-8">
            <h3>Riwayat Produksi</h3>
            <table class=table table-boardered table-striped>
                <thead class="table-dark">
                    <tr>
                        <th>Tanggal</th>
                        <th>Operator</th>
                        <th>Shift</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tabelBody">
                    <!-- Data akan masuk di sini lewat JS-->
                </tbody>
            </table>
        </div>
    </div>

    <script src="script_log.js"></script>
</body>

</html>
