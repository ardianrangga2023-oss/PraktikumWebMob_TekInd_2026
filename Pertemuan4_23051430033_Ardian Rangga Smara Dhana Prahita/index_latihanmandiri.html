<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kalkulator Biaya Produksi</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-image: url("bg_kalkulator.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    width:350px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    font-size:14px;
}

input{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
    background:#09ef80;
    color:white;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    background:#24c600;
}

.result{
    margin-top:20px;
    padding:10px;
    background:#c0c0c0;
    border-radius:5px;
}
</style>

</head>
<body>

<div class="container">
<h2>Kalkulator Biaya Produksi</h2>

<label>Biaya Bahan Baku</label>
<input type="number" id="bahan" placeholder="Contoh: 5000000">

<label>Biaya Tenaga Kerja</label>
<input type="number" id="tenaga" placeholder="Contoh: 750000">

<label>Biaya Overhead</label>
<input type="number" id="overhead" placeholder="Contoh: 200000">

<label>Jumlah Produksi</label>
<input type="number" id="produksi" placeholder="Contoh: 1500 unit">


<button onclick="hitungBiaya()">Hitung</button>


<div class="result" id="hasil"></div>
</div>

<script src="script_latihanmandiri.js"></script>

</body>
</html>
